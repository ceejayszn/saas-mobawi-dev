name: Deploy Mobawi Admin to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'mobawi_admin/**'
      - '.github/workflows/deploy-admin.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.2' # Matches user environment SDK requirements

      - name: Install dependencies and build Web
        run: |
          cd mobawi_admin
          flutter pub get
          flutter build web --release --base-href "/saas-mobawi-dev/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: mobawi_admin/build/web
          branch: gh-pages
