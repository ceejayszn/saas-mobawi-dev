name: boss_app
description: "Euton Hotel Admin POS Service"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  table_calendar: ^3.2.0

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.3

  # Hashing / security
  crypto: ^3.0.5

  # Device & package info
  package_info_plus: ^8.3.0
  device_info_plus: ^10.1.2
  battery_plus: ^6.2.1

  # URL launcher (for support: call/email)
  url_launcher: ^6.3.1

  # PDF & Excel export
  pdf: ^3.11.3
  printing: ^5.14.2
  image_picker: ^1.2.2
  share_plus: ^12.0.2
  csv: ^8.0.0
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
